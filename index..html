<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>運転代行日報</title>
    <style>
        :root {
            --bg-color: #121212; --card-bg: #1e1e1e; --text-color: #ffffff;
            --accent-color: #4CAF50; --btn-gps: #2196F3; --btn-time: #FF9800;
        }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 10px 10px 100px 10px; }
        .report-card { background: var(--card-bg); border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.85rem; margin-bottom: 4px; color: #aaa; }
        .row { display: flex; gap: 8px; margin-bottom: 8px; }
        input { width: 100%; height: 44px; background: #2a2a2a; border: 1px solid #444; color: #fff; border-radius: 6px; padding: 0 10px; box-sizing: border-box; font-size: 16px; }
        button { border: none; border-radius: 6px; color: white; font-weight: bold; height: 44px; cursor: pointer; }
        .btn-gps { background: var(--btn-gps); width: 100px; flex-shrink: 0; }
        .btn-time { background: var(--btn-time); width: 80px; flex-shrink: 0; }
        .btn-add { background: var(--accent-color); width: calc(100% - 20px); height: 50px; position: fixed; bottom: 20px; left: 10px; font-size: 1.1rem; }
        .wait-display { background: #000; padding: 8px; border-radius: 6px; text-align: center; color: var(--btn-time); font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

    <h2 style="text-align:center">🚗 代行日報入力</h2>
    <div id="card-container"></div>
    <button class="btn-add" onclick="addCard()">＋ 新しい運行を追加</button>
    <div id="debug-log" style="color:red; font-size:10px; margin-top:20px;"></div>

    <script>
        let cardCount = 0;

        // カード追加関数
        function addCard() {
            cardCount++;
            const container = document.getElementById('card-container');
            const div = document.createElement('div');
            div.className = 'report-card';
            div.innerHTML = `
                <div style="margin-bottom:10px;"><strong>No. ${cardCount}</strong></div>
                <div class="input-group">
                    <label>出発地</label>
                    <div class="row">
                        <input type="text" id="start-${cardCount}">
                        <button class="btn-gps" onclick="getLocation('start-${cardCount}')">📍現在地</button>
                    </div>
                </div>
                <div class="input-group" style="background:#252525; padding:10px; border-radius:8px;">
                    <label>待機計算</label>
                    <div class="row">
                        <input type="time" id="t-start-${cardCount}" onchange="calc(${cardCount})">
                        <button class="btn-time" onclick="setTime('t-start-${cardCount}', ${cardCount})">到着</button>
                    </div>
                    <div class="row">
                        <input type="time" id="t-end-${cardCount}" onchange="calc(${cardCount})">
                        <button class="btn-time" onclick="setTime('t-end-${cardCount}', ${cardCount})">出発</button>
                    </div>
                    <div id="res-${cardCount}" class="wait-display">待機：0分</div>
                </div>
                <div class="input-group">
                    <label>最終到着地</label>
                    <div class="row">
                        <input type="text" id="end-${cardCount}">
                        <button class="btn-gps" onclick="getLocation('end-${cardCount}')">📍現在地</button>
                    </div>
                </div>
            `;
            container.appendChild(div);
        }

        // 時刻セット
        function setTime(id, cIdx) {
            const now = new Date();
            const val = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            document.getElementById(id).value = val;
            calc(cIdx);
        }

        // 待機計算
        function calc(idx) {
            const s = document.getElementById(`t-start-${idx}`).value;
            const e = document.getElementById(`t-end-${idx}`).value;
            if(s && e) {
                const [sh, sm] = s.split(':').map(Number);
                const [eh, em] = e.split(':').map(Number);
                let diff = (eh * 60 + em) - (sh * 60 + sm);
                if(diff < 0) diff += 1440;
                document.getElementById(`res-${idx}`).innerText = `待機：${diff}分`;
            }
        }

        // GPS取得
        function getLocation(id) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const {latitude: lat, longitude: lon} = pos.coords;
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&addressdetails=1`, {
                        headers: { 'Accept-Language': 'ja' }
                    });
                    const data = await res.json();
                    if(data.address) {
                        const a = data.address;
                        document.getElementById(id).value = (a.city || a.town || "") + (a.suburb || a.neighbourhood || "") + (a.road || "");
                    }
                } catch(e) { console.error(e); }
            }, (err) => alert("位置情報の取得を許可してください"));
        }

        // 初回起動
        window.onload = addCard;
    </script>
</body>
</html>

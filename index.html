<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>運転代行日報アプリ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 深いダークモード設定 */
        body { background-color: #0f172a; color: #f1f5f9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .card { background-color: #1e293b; border: 1px solid #334155; border-left: 6px solid #22c55e; }
        input, select { background-color: #0f172a !important; color: #fff !important; border: 1.5px solid #475569 !important; font-size: 1.1rem !important; }
        input:focus { border-color: #22c55e !important; outline: none; }
        
        /* 現場用デカボタン */
        .btn-now { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }
        .btn-gps { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
        .btn-add { background: linear-gradient(135deg, #10b981, #059669); color: white; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); }
        
        /* アニメーション */
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 pb-28">

    <header class="mb-6 text-center">
        <h1 class="text-2xl font-black text-green-400 tracking-wider">運転代行 業務日報</h1>
        <p class="text-xs text-slate-400 mt-1">スマホ縦画面・夜間操作特化型</p>
    </header>

    <div id="cardContainer"></div>

    <div class="fixed bottom-0 left-0 right-0 p-4 bg-slate-900/80 backdrop-blur-md">
        <button onclick="addNewCard()" class="w-full btn-add py-4 rounded-2xl text-xl font-bold active:scale-95 transition-transform">
            ＋ 新しい運行を追加
        </button>
    </div>

    <div class="mt-8 p-3 bg-black/50 rounded text-[10px] text-red-400 font-mono hidden" id="debugArea">
        <div class="font-bold border-b border-red-900 mb-1 pb-1">⚠️ SYSTEM LOG</div>
        <div id="debugLog"></div>
    </div>

    <script>
        let cardCount = 0;

        // 現在時刻取得 (HH:mm)
        const getCurrentTime = () => {
            const now = new Date();
            return `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        };

        // デバッグログ
        function logError(msg) {
            const area = document.getElementById('debugArea');
            const log = document.getElementById('debugLog');
            area.classList.remove('hidden');
            log.innerHTML += `<div>[${getCurrentTime()}] ${msg}</div>`;
        }

        // 待機時間計算
        function calculateWait(id) {
            const start = document.getElementById(`waitArrival_${id}`).value;
            const end = document.getElementById(`waitDeparture_${id}`).value;
            const display = document.getElementById(`waitResult_${id}`);

            if (start && end) {
                const [sh, sm] = start.split(':').map(Number);
                const [eh, em] = end.split(':').map(Number);
                let diff = (eh * 60 + em) - (sh * 60 + sm);
                if (diff < 0) diff += 1440; // 日跨ぎ計算
                display.innerText = `待機時間：${diff}分`;
                display.classList.add('text-green-400');
            }
        }

        // 【最重要】住所取得ロジック（市区町村＋地区＋道路名を連結）
        async function setLocation(inputId) {
            const input = document.getElementById(inputId);
            const originalVal = input.value;
            input.value = "取得中...";

            if (!navigator.geolocation) {
                logError("お使いのブラウザはGPS非対応です");
                return;
            }

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude, longitude } = pos.coords;
                try {
                    // OpenStreetMap Nominatim API (日本語設定)
                    const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&zoom=18&addressdetails=1`;
                    const res = await fetch(url, { headers: { 'Accept-Language': 'ja' } });
                    const data = await res.json();
                    
                    if (data.address) {
                        const a = data.address;
                        // 市区町村
                        const city = a.city || a.town || a.village || a.county || "";
                        // 地区名（ここが重要：suburb, neighbourhood等を網羅）
                        const district = a.city_district || a.suburb || a.neighbourhood || a.quarter || "";
                        // 道路・番地
                        const road = a.road || "";

                        let result = city + district + road;
                        
                        // 万が一データが取れない場合の予備
                        if (!result) result = data.display_name.split(',')[0];
                        
                        input.value = result;
                    } else {
                        input.value = "住所不明";
                    }
                } catch (e) {
                    logError("通信エラー: " + e.message);
                    input.value = originalVal;
                }
            }, (err) => {
                logError("GPS取得失敗: " + err.message);
                input.value = "GPSエラー";
            }, { enableHighAccuracy: true, timeout: 8000 });
        }

        // カード生成
        function addNewCard() {
            cardCount++;
            const id = cardCount;
            const card = document.createElement('div');
            card.className = "card p-5 mb-8 rounded-3xl shadow-2xl fade-in";
            card.innerHTML = `
                <div class="flex justify-between items-center mb-5">
                    <div class="flex items-center gap-3">
                        <span class="bg-green-500 text-slate-900 px-3 py-1 rounded-full font-black">No.${id}</span>
                        <select class="rounded-lg px-2 py-1 font-bold">
                            <option>代行</option>
                            <option>随伴</option>
                        </select>
                    </div>
                    <button onclick="this.closest('.card').remove()" class="text-slate-500 text-sm">削除</button>
                </div>

                <div class="mb-5">
                    <label class="block text-sm font-bold text-slate-400 mb-2">【1】出発地 (店名など)</label>
                    <div class="flex gap-2">
                        <input type="text" id="start_${id}" class="flex-1 p-4 rounded-xl" placeholder="例：居酒屋 錦">
                        <button onclick="setLocation('start_${id}')" class="btn-gps px-4 rounded-xl text-2xl">📍</button>
                    </div>
                </div>

                <div class="mb-5 bg-black/40 p-4 rounded-2xl border border-slate-700">
                    <div class="grid grid-cols-2 gap-4 mb-3">
                        <div>
                            <label class="block text-xs text-slate-500 mb-1">店到着</label>
                            <div class="flex gap-1">
                                <input type="time" id="waitArrival_${id}" onchange="calculateWait(${id})" class="flex-1 p-2 rounded-lg text-sm">
                                <button onclick="document.getElementById('waitArrival_${id}').value=getCurrentTime(); calculateWait(${id})" class="btn-now px-2 rounded-lg text-xs">🕒</button>
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs text-slate-500 mb-1">店出発</label>
                            <div class="flex gap-1">
                                <input type="time" id="waitDeparture_${id}" onchange="calculateWait(${id})" class="flex-1 p-2 rounded-lg text-sm">
                                <button onclick="document.getElementById('waitDeparture_${id}').value=getCurrentTime(); calculateWait(${id})" class="btn-now px-2 rounded-lg text-xs">🕒</button>
                            </div>
                        </div>
                    </div>
                    <div id="waitResult_${id}" class="text-center text-sm font-bold text-slate-500 tracking-widest">待機時間：0分</div>
                </div>

                <div class="mb-5">
                    <label class="block text-sm font-bold text-slate-400 mb-2">【2】経由地</label>
                    <div class="flex gap-2">
                        <input type="text" id="via_${id}" class="flex-1 p-4 rounded-xl" placeholder="経由地（なし可）">
                        <button onclick="setLocation('via_${id}')" class="btn-gps px-4 rounded-xl text-2xl">📍</button>
                    </div>
                </div>

                <div class="mb-5 border-t border-slate-700 pt-5">
                    <label class="block text-sm font-bold text-orange-400 mb-2">【3】最終到着地</label>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="goal_${id}" class="flex-1 p-4 rounded-xl" placeholder="お客様宅など">
                        <button onclick="setLocation('goal_${id}')" class="btn-gps px-4 rounded-xl text-2xl">📍</button>
                    </div>
                    <div class="flex gap-2">
                        <input type="time" id="goalTime_${id}" class="flex-1 p-4 rounded-xl text-xl">
                        <button onclick="document.getElementById('goalTime_${id}').value=getCurrentTime()" class="btn-now px-8 rounded-xl font-bold text-lg">🕒 今</button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-800/50 p-3 rounded-2xl">
                        <label class="block text-xs text-slate-400 mb-1 text-center">実車距離(km)</label>
                        <input type="number" step="0.1" class="w-full p-2 rounded-lg text-center font-bold" placeholder="0.0">
                    </div>
                    <div class="bg-slate-800/50 p-3 rounded-2xl">
                        <label class="block text-xs text-slate-400 mb-1 text-center">料金(円)</label>
                        <input type="number" class="w-full p-2 rounded-lg text-center font-bold" placeholder="0">
                    </div>
                </div>
            `;
            document.getElementById('cardContainer').appendChild(card);
            // 新しいカードへスクロール
            card.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // 起動時に最初の1枚を表示
        window.onload = addNewCard;
    </script>
</body>
</html>
